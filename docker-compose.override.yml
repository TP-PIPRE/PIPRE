services:
  backend:
    ports:
      - "${PORT_BACK:-8080}:8080"

  frontend:
    ports:
      - "${PORT_FRONT:-3000}:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:${PORT_BACK:-8080}
    build:
      args:
        - REACT_APP_API_URL=http://localhost:${PORT_BACK:-8080}
    networks:
      - devops_network

networks:
  devops_network:
    external: false