name: pipre-application

services:

  postgres:
    image: postgres:16-alpine
    container_name: PipreDatabase
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-pipre_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pipre_password}
      - POSTGRES_DB=${POSTGRES_DB:-pipre_database}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pipre_user} -d ${POSTGRES_DB:-pipre_database}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - pipre-network

  backend:
    build: ./backend
    image: pipre-backend
    container_name: PipreBackend
    environment:
      - DATABASE_URL=${DATABASE_URL:-jdbc:postgresql://postgres:5432/pipre_database}
      - POSTGRES_USER=${POSTGRES_USER:-pipre_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pipre_password}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipre-network
      - devops_network

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://backend:8080
    image: pipre-frontend
    container_name: PipreFrontend
    environment:
      - REACT_APP_API_URL=http://backend:8080
    networks:
      - pipre-network
      - devops_network
networks:
  pipre-network:
    driver: bridge
  devops_network:
    external: true